# TIA SPA + API reverse proxy.
# Resolver + variable upstreams so nginx survives api container restarts
# (it re-resolves the Docker DNS name instead of caching a stale IP at boot).

server {
    listen      80;
    server_name _;

    resolver 127.0.0.11 valid=30s ipv6=off;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Force HTTPS for real visitors ─────────────────────────────────
    # TLS terminates at the Cloudflare edge; cloudflared forwards the visitor's
    # original scheme in X-Forwarded-Proto. Redirect only when it is explicitly
    # "http" — the internal Docker healthcheck sends no such header, so it never
    # loops. Edge-independent (works even if "Always Use HTTPS" is off).
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"               always;
    add_header X-Frame-Options        "SAMEORIGIN"            always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    # HSTS — honoured by browsers only over HTTPS (which CF always serves to clients).
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── Compression ───────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml;

    client_max_body_size 25m;

    # ── Edge health (used by the container HEALTHCHECK / LB) ───────────
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ── Server-Sent Events: must bypass buffering so events stream live ─
    location = /api/events/stream {
        set $api http://api:8000;
        proxy_pass               $api/events/stream;
        proxy_http_version       1.1;
        proxy_set_header Connection "";
        proxy_set_header Host             $host;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       3600s;
    }

    # ── API reverse proxy: strip the /api prefix, forward to FastAPI ────
    location /api/ {
        set $api http://api:8000;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass               $api;
        proxy_http_version       1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout       300s;
        proxy_send_timeout       300s;
    }

    # ── MCP server (Model Context Protocol, Streamable-HTTP) ───────────
    # Public endpoint for MCP hosts (Claude, Cursor, Kiro, custom). Stateless
    # JSON transport, so a plain reverse proxy is enough. Use the trailing
    # slash (/mcp/) to skip the mount redirect. Buffering off + long timeouts
    # so tool calls that take a few seconds aren't cut off.
    location /mcp {
        set $mcp http://api:8000;
        proxy_pass               $mcp;
        proxy_http_version       1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering          off;
        proxy_cache              off;
        proxy_read_timeout       300s;
        proxy_send_timeout       300s;
    }

    # ── Hashed static assets: cache hard (Vite fingerprints filenames) ──
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── SPA fallback ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
