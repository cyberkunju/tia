<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="TIA — Touchless Invoice Agent, for TASC Outsourcing UAE">
  <title>TIA — Touchless Invoice Agent</title>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdf8f5"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fdf4ee"/>
    </linearGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9531e"/>
      <stop offset="1" stop-color="#ed7547"/>
    </linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#0f172a" fill-opacity="0.05"/>
    </pattern>
    <clipPath id="plate">
      <rect x="1" y="1" width="1278" height="358" rx="22"/>
    </clipPath>
  </defs>

  <!-- plate -->
  <rect x="1" y="1" width="1278" height="358" rx="22" fill="url(#paper)" stroke="#e7ecf2" stroke-width="1.5"/>
  <g clip-path="url(#plate)">
    <rect x="1" y="1" width="1278" height="358" fill="url(#dots)"/>
    <!-- faint oversized glyph watermark, bleeding off the right edge -->
    <g transform="translate(980,40) scale(0.62)" fill="#d9531e" fill-opacity="0.04">
      <path d="M0,0 631,0 631,177 426,177 426,767 236,767 236,177 0,177 Z"/>
      <path d="M676,0 862,0 862,557 739,767 675,767 Z"/>
      <path d="M1233,1 1287,90 1680,769 1052,769 1153,592 1367,591 1235,352 1232,352 1162,481 1001,767 792,768 791,765 815,723 Z"/>
    </g>
  </g>

  <!-- TIA mark -->
  <g transform="translate(84,128) scale(0.13524)" fill="#d9531e">
    <path d="M0,0 631,0 631,177 426,177 426,767 236,767 236,177 0,177 Z"/>
    <path d="M676,0 862,0 862,557 739,767 675,767 Z"/>
    <path d="M1233,1 1287,90 1680,769 1052,769 1153,592 1367,591 1235,352 1232,352 1162,481 1001,767 792,768 791,765 815,723 Z"/>
  </g>

  <!-- divider -->
  <line x1="356" y1="104" x2="356" y2="256" stroke="#e7ecf2" stroke-width="1.5"/>

  <!-- wordmark block -->
  <text x="396" y="126" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="13" font-weight="700" letter-spacing="3.2" fill="#94a3b8">TASC OUTSOURCING&#160;&#160;·&#160;&#160;UNITED ARAB EMIRATES</text>
  <text x="394" y="188" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="44" font-weight="700" letter-spacing="-0.8" fill="#0f172a">Touchless Invoice Agent</text>
  <rect x="396" y="206" width="62" height="3.5" rx="1.75" fill="url(#rule)"/>
  <text x="396" y="248" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="19" font-weight="400" fill="#64748b">Any timesheet in.&#160; A compliant UAE tax invoice out.</text>

  <!-- approval stamp -->
  <g transform="rotate(-4 1088 182)">
    <rect x="990" y="146" width="196" height="74" rx="11" fill="#fef4ef" stroke="#ed7547" stroke-width="2"/>
    <rect x="997" y="153" width="182" height="60" rx="7" fill="none" stroke="#f5a07c" stroke-width="1" stroke-dasharray="1 4" stroke-linecap="round"/>
    <text x="1088" y="183" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="22" font-weight="800" letter-spacing="2.5" fill="#9b3414">TOUCHLESS</text>
    <text x="1088" y="201" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="9.5" font-weight="600" letter-spacing="3.4" fill="#bf4117">UAE TAX INVOICE</text>
  </g>

  <!-- footer -->
  <line x1="84" y1="312" x2="1196" y2="312" stroke="#e7ecf2" stroke-width="1.5"/>
  <text x="84" y="334" font-family="'SFMono-Regular','Consolas',monospace" font-size="11.5" letter-spacing="0.4" fill="#94a3b8">github.com/cyberkunju/tia</text>
  <text x="1196" y="334" text-anchor="end" font-family="'Inter','Helvetica Neue',Arial,sans-serif" font-size="11.5" font-weight="600" letter-spacing="1.2" fill="#94a3b8">WhatsApp&#160; ·&#160; Email&#160; ·&#160; Portal&#160; ·&#160; API</text>
</svg>
