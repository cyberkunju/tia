# Alembic config for TIA. Runtime migrations are driven programmatically by
# tia_ai.migrate.run_migrations() (which sets script_location + sqlalchemy.url on
# a Config object); this file exists for the `alembic` CLI used to AUTHOR new
# migrations, e.g.:
#
#   cd workers/ai
#   TIA_ALEMBIC_URL="sqlite:///$(mktemp)" uv run alembic revision --autogenerate -m "add x"
#
# The URL is supplied via the TIA_ALEMBIC_URL env var (see migrations/env.py), so
# no credentials live in this file.
[alembic]
script_location = migrations
prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
