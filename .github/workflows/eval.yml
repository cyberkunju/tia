name: eval

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  field-f1:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with: { enable-cache: true }
      - name: install python 3.12
        run: uv python install 3.12
      - name: sync deps
        working-directory: workers/ai
        run: uv sync --no-dev
      - name: seed master data
        working-directory: workers/ai
        run: uv run python -m tia_ai.seed
      - name: regenerate the 7 sample inputs
        working-directory: workers/ai
        run: uv run python -m tia_ai.synthgen
      - name: run eval (case 4 skipped in CI — vision requires Modal)
        working-directory: workers/ai
        run: |
          uv run python - <<'PY'
          import json, sys
          from tia_ai.eval.run import run_case, _ece
          cases = ["01","02","03","05","06","07"]  # text/excel only
          results = [run_case(c) for c in cases]
          calibration = []
          for r in results:
              calibration += r.get("calibration", [])
          passed = sum(1 for r in results if r.get("passed"))
          ece = _ece(calibration)
          field_keys = list(results[0]["f1"].keys()) if results else []
          macro = {k: round(sum(r["f1"][k] for r in results)/len(results), 4) for k in field_keys}
          print(json.dumps({"passed": passed, "of": len(results), "ece": ece, "macro_f1": macro}, indent=2))
          # Gate: 100% pass for non-vision cases, days_worked F1 >= 0.98
          if passed != len(results):
              print(f"FAIL: only {passed}/{len(results)} cases passed", file=sys.stderr)
              sys.exit(1)
          if macro.get("days_worked", 0.0) < 0.98:
              print(f"FAIL: days_worked F1 {macro['days_worked']} < 0.98 threshold", file=sys.stderr)
              sys.exit(1)
          PY
