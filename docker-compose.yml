# ─────────────────────────────────────────────────────────────────────────────
# TIA - production stack: Postgres 18 + FastAPI worker + nginx-served SPA.
# Continuous deploy verified: pushes to the default branch roll out via deploy/.
#
#   cp .env.docker.example .env   # then edit secrets
#   docker compose up -d --build
#   open http://localhost:8080
# ─────────────────────────────────────────────────────────────────────────────
name: tia

services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tia}
      POSTGRES_DB: ${POSTGRES_DB:-tia}
    volumes:
      # Postgres 18+ stores data in a version-specific subdir; mount the parent.
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tia} -d ${POSTGRES_DB:-tia}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [tia]

  api:
    build:
      context: .
      dockerfile: workers/ai/Dockerfile
    image: tia-api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tia}:${POSTGRES_PASSWORD:-tia}@db:5432/${POSTGRES_DB:-tia}
      GLM_OCR_BASE_URL: ${GLM_OCR_BASE_URL:-https://ocr.cyberkunju.com/v1}
      GLM_OCR_API_KEY: ${GLM_OCR_API_KEY:-}
      GLM_OCR_MODEL: ${GLM_OCR_MODEL:-glm-ocr:q8_0}
      # Chat agent: Azure OpenAI (gpt-5.4-nano). No direct OpenAI key in the deploy env.
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-}
      AZURE_AI_KEY: ${AZURE_AI_KEY:-}
      AZURE_AI_API_VERSION: ${AZURE_AI_API_VERSION:-2024-05-01-preview}
      AZURE_CHAT_MODEL: ${AZURE_CHAT_MODEL:-gpt-5.4-nano}
      # Zoho Mail — email-intake mailbox poller + outbound replies
      ZOHO_IMAP_USER: ${ZOHO_IMAP_USER:-}
      ZOHO_IMAP_PASSWORD: ${ZOHO_IMAP_PASSWORD:-}
      ZOHO_IMAP_HOST: ${ZOHO_IMAP_HOST:-imap.zoho.in}
      ZOHO_IMAP_PORT: ${ZOHO_IMAP_PORT:-993}
      ZOHO_IMAP_FOLDER: ${ZOHO_IMAP_FOLDER:-INBOX}
      ZOHO_POLL_INTERVAL_SEC: ${ZOHO_POLL_INTERVAL_SEC:-10}
      ZOHO_SMTP_HOST: ${ZOHO_SMTP_HOST:-smtp.zoho.in}
      ZOHO_SMTP_PORT: ${ZOHO_SMTP_PORT:-465}
      ZOHO_SMTP_USE_SSL: ${ZOHO_SMTP_USE_SSL:-1}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TIA_SEED_ON_START: ${TIA_SEED_ON_START:-true}
      TIA_SYNTH_ON_START: ${TIA_SYNTH_ON_START:-true}
      # Confidence-gated touchless path: clean, fully-resolved, rule-passing
      # timesheets auto-invoice; only low-confidence/ambiguous/rule-flagged ones
      # go to the web approval queue. Set false to force approval on everything.
      TIA_AUTO_APPROVE: ${TIA_AUTO_APPROVE:-true}
      # WhatsApp loop: where the core pushes the approved invoice, and how the bridge
      # fetches the PDF back from the core. INTERNAL_SECRET must match the bridge.
      WHATSAPP_BRIDGE_URL: http://whatsapp:8088
      TIA_SELF_URL: http://api:8000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-tia-internal-dev}
    volumes:
      - staging:/app/staging
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks: [tia]

  web:
    build:
      context: apps/web
      args:
        VITE_API_BASE: /api
    image: tia-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy
    networks: [tia]

  # WhatsApp Cloud API bridge - forwards inbound timesheets to the core and returns the invoice.
  # Runs as part of the default stack so the full WhatsApp loop is live in the deploy.
  # The bridge starts even without Meta creds (it just can't send), so it never crash-loops.
  whatsapp:
    build:
      context: workers/whatsapp
    image: tia-whatsapp:latest
    restart: unless-stopped
    environment:
      UPSTREAM_API_URL: http://api:8000
      # The core downloads attachment_url over the compose network from the bridge.
      BRIDGE_PUBLIC_URL: ${BRIDGE_PUBLIC_URL:-http://whatsapp:8088}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-tia-verify-dev}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v23.0}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-tia-internal-dev}
      NODE_ENV: production
    volumes:
      - wa-staging:/app/staging
    ports:
      - "${WHATSAPP_PORT:-8088}:8088"
    depends_on:
      api:
        condition: service_healthy
    networks: [tia]

volumes:
  db-data:
  staging:
  wa-staging:

networks:
  tia:
    driver: bridge
