# ─────────────────────────────────────────────────────────────────────────────
# TIA - production stack: Postgres 18 + FastAPI worker + nginx-served SPA +
# WhatsApp bridge. Continuous deploy verified: pushes to the default branch roll
# out via deploy/.
#
#   cp .env.docker.example .env   # then set POSTGRES_PASSWORD + secrets
#   docker compose up -d --build
#   open http://localhost:8090
#
# Hardening baked in: per-service CPU/memory limits (sized empirically, tunable
# via env), bounded JSON log rotation, no-new-privileges, tini init for clean
# signal handling, and localhost-only host port binds (the Cloudflare tunnel
# reaches the edge over loopback, so nothing needs to listen on 0.0.0.0).
# ─────────────────────────────────────────────────────────────────────────────
name: tia

# Bounded logs: without this, json-file logs grow unbounded and eventually fill
# the disk on a long-running host. 10m x 5 files = 50m ceiling per container.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Common per-service hardening shared by every container.
x-svc: &svc
  restart: unless-stopped
  init: true                       # tini as PID 1: reap children + forward SIGTERM
  security_opt:
    - no-new-privileges:true       # block setuid privilege escalation inside the container
  logging: *default-logging
  networks: [tia]

services:
  db:
    <<: *svc
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tia}
      # Fail loud if unset — never silently fall back to a default, which is how
      # a stale volume password drifts out of sync with the app and breaks auth.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.docker.example)}
      POSTGRES_DB: ${POSTGRES_DB:-tia}
    volumes:
      # Postgres 18+ stores data in a version-specific subdir; mount the parent.
      - db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tia} -d ${POSTGRES_DB:-tia}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${DB_CPUS:-1.0}"
          memory: ${DB_MEM:-512M}
        reservations:
          memory: 128M
    networks: [tia]

  api:
    <<: *svc
    build:
      context: .
      dockerfile: workers/ai/Dockerfile
    image: tia-api:latest
    # Give in-flight pipeline work (parse/match/render) time to finish on deploy.
    stop_grace_period: 30s
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-tia}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-tia}
      GLM_OCR_BASE_URL: ${GLM_OCR_BASE_URL:-https://ocr.cyberkunju.com/v1}
      GLM_OCR_API_KEY: ${GLM_OCR_API_KEY:-}
      GLM_OCR_MODEL: ${GLM_OCR_MODEL:-glm-ocr:q8_0}
      # Mistral Document AI (Azure) — instant OCR fallback when GLM-OCR is unreachable.
      MISTRAL_OCR_ENDPOINT: ${MISTRAL_OCR_ENDPOINT:-}
      MISTRAL_OCR_API_KEY: ${MISTRAL_OCR_API_KEY:-}
      MISTRAL_OCR_MODEL: ${MISTRAL_OCR_MODEL:-mistral-document-ai-2512}
      # Chat agent: Azure OpenAI (gpt-5.4-nano). No direct OpenAI key in the deploy env.
      AZURE_AI_ENDPOINT: ${AZURE_AI_ENDPOINT:-}
      AZURE_AI_KEY: ${AZURE_AI_KEY:-}
      AZURE_AI_API_VERSION: ${AZURE_AI_API_VERSION:-2024-05-01-preview}
      AZURE_CHAT_MODEL: ${AZURE_CHAT_MODEL:-gpt-5.4-nano}
      # Zoho Mail — email-intake mailbox poller + outbound replies
      ZOHO_IMAP_USER: ${ZOHO_IMAP_USER:-}
      ZOHO_IMAP_PASSWORD: ${ZOHO_IMAP_PASSWORD:-}
      ZOHO_IMAP_HOST: ${ZOHO_IMAP_HOST:-imap.zoho.in}
      ZOHO_IMAP_PORT: ${ZOHO_IMAP_PORT:-993}
      ZOHO_IMAP_FOLDER: ${ZOHO_IMAP_FOLDER:-INBOX}
      ZOHO_POLL_INTERVAL_SEC: ${ZOHO_POLL_INTERVAL_SEC:-10}
      ZOHO_SMTP_HOST: ${ZOHO_SMTP_HOST:-smtp.zoho.in}
      ZOHO_SMTP_PORT: ${ZOHO_SMTP_PORT:-465}
      ZOHO_SMTP_USE_SSL: ${ZOHO_SMTP_USE_SSL:-1}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-auto}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Observability: set LOG_FORMAT=json for structured logs a shipper can parse;
      # set SENTRY_DSN (+ build with the `sentry` extra) to enable error tracking.
      # Prometheus metrics are always exposed at GET /metrics (token-gated when
      # TIA_API_TOKEN is set).
      LOG_FORMAT: ${LOG_FORMAT:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      TIA_ENV: ${TIA_ENV:-production}
      # API security — open by default (public demo). Set TIA_API_TOKEN to require
      # `Authorization: Bearer <token>` on the dashboard/mutation surface; the intake
      # pipeline + webhook + health stay exempt so the WhatsApp/email loop never breaks.
      TIA_API_TOKEN: ${TIA_API_TOKEN:-}
      TIA_ALLOWED_ORIGINS: ${TIA_ALLOWED_ORIGINS:-https://tia.cyberkunju.com,http://localhost:5173,http://localhost:8090}
      # SAP Business One Service Layer — real A/R Invoice POST on dispatch. Off by
      # default (the pipeline only generates the OData payload + WPS artifacts).
      SAP_B1_ENABLED: ${SAP_B1_ENABLED:-0}
      SAP_B1_BASE_URL: ${SAP_B1_BASE_URL:-}
      SAP_B1_COMPANY_DB: ${SAP_B1_COMPANY_DB:-}
      SAP_B1_USER: ${SAP_B1_USER:-}
      SAP_B1_PASSWORD: ${SAP_B1_PASSWORD:-}
      SAP_B1_VERIFY_TLS: ${SAP_B1_VERIFY_TLS:-1}
      TIA_SEED_ON_START: ${TIA_SEED_ON_START:-true}
      TIA_SYNTH_ON_START: ${TIA_SYNTH_ON_START:-true}
      # Schema init: default is create_all + additive column ensure (unchanged for
      # existing deploys). Set TIA_MIGRATE=alembic to make Alembic the authority
      # (fresh DBs upgrade to head; a pre-Alembic DB is auto-stamped). Take a backup
      # and cut over deliberately.
      TIA_MIGRATE: ${TIA_MIGRATE:-}
      # Confidence-gated touchless path: clean, fully-resolved, rule-passing
      # timesheets auto-invoice; only low-confidence/ambiguous/rule-flagged ones
      # go to the web approval queue. Set false to force approval on everything.
      TIA_AUTO_APPROVE: ${TIA_AUTO_APPROVE:-true}
      # WhatsApp loop: where the core pushes the approved invoice, and how the bridge
      # fetches the PDF back from the core. INTERNAL_SECRET must match the bridge.
      WHATSAPP_BRIDGE_URL: http://whatsapp:8088
      TIA_SELF_URL: http://api:8000
      INTERNAL_SECRET: ${INTERNAL_SECRET:-tia-internal-dev}
    volumes:
      - staging:/app/staging
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        # api is the only CPU/mem-hungry tier (uvicorn workers + scipy matcher +
        # typst render). Workers AUTO-SIZE to this budget at startup (~300MB each),
        # so it never OOMs or oversubscribes cores — set API_CPUS/API_MEM to your
        # box and the worker count follows. Memory is worker-count-driven: ~260MB
        # base + ~170MB/worker resident. These defaults (3 cores, 1.5G) right-size
        # to ~3 workers and serve 5 concurrent users cleanly on this 4-core host;
        # for a 1-CPU/1GB box set API_CPUS=1.0 + API_MEM=1G (=> 1 worker, the 5
        # requests serialize but never fail).
        limits:
          cpus: "${API_CPUS:-3.0}"
          memory: ${API_MEM:-1536M}
        reservations:
          cpus: "0.25"
          memory: ${API_MEM_MIN:-512M}

  web:
    <<: *svc
    build:
      context: apps/web
      args:
        VITE_API_BASE: /api
        VITE_API_TOKEN: ${TIA_API_TOKEN:-}
    image: tia-web:latest
    ports:
      # Bind to loopback only: cloudflared reaches the edge over localhost, so the
      # port never needs to be exposed on the LAN/0.0.0.0.
      - "127.0.0.1:${WEB_PORT:-8090}:80"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 16M

  # WhatsApp Cloud API bridge - forwards inbound timesheets to the core and returns the invoice.
  # Runs as part of the default stack so the full WhatsApp loop is live in the deploy.
  # The bridge starts even without Meta creds (it just can't send), so it never crash-loops.
  whatsapp:
    <<: *svc
    build:
      context: workers/whatsapp
    image: tia-whatsapp:latest
    environment:
      UPSTREAM_API_URL: http://api:8000
      # The core downloads attachment_url over the compose network from the bridge.
      BRIDGE_PUBLIC_URL: ${BRIDGE_PUBLIC_URL:-http://whatsapp:8088}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-tia-verify-dev}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v23.0}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-tia-internal-dev}
      NODE_ENV: production
    volumes:
      - wa-staging:/app/staging
    ports:
      - "127.0.0.1:${WHATSAPP_PORT:-8088}:8088"
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 32M

volumes:
  db-data:
  staging:
  wa-staging:

networks:
  tia:
    driver: bridge
